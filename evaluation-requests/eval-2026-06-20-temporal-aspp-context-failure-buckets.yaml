diagnostic_question: >-
  On the temporal-eligible GVCCS Working Validation subset, does the centered
  three-frame temporal ASPP-context U-Net improve validation Dice by broadly
  reducing false-positive-heavy, false-negative-heavy, empty-mask false-positive,
  and missed-positive-mask failures, or is the gain mainly a threshold-local or
  subset-selection effect that still leaves concentrated failure buckets?
expected_decision_impact: >-
  Use the aggregate metrics, threshold sweep, per-sample metrics, and bounded
  deterministic diagnostic samples to decide whether temporal ASPP-context should
  be the next primary family for architecture iteration. If the evaluation shows
  broad bucket-level improvement and a stable threshold neighborhood around 0.5,
  propose the next temporal refinement or a matched temporal-eligible single-frame
  control. If gains are localized to threshold choice or residual failures are
  dominated by missed thin positives or empty-mask false positives, prefer a
  targeted loss/data-policy Capability Request or a simpler matched-control
  Candidate Experiment before adding temporal architecture complexity.
