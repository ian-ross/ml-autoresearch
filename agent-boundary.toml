[agent_control_boundary]
distro = "debian"
image = "../../containers/ml-autoresearch-agent"
allow_egress = true

# Approved read-only Research Problem data mounts. Each mount path must exist,
# target must be a direct child of /data, and readonly must remain true.
#
# Example:
# [[data_mounts]]
# name = "example_research_problem_data"
# path = "/path/to/research-problem-data"
# target = "/data/example-research-problem-data"
# readonly = true
