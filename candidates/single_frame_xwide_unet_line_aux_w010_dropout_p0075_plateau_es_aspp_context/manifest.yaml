name: single_frame_xwide_unet_line_aux_w010_dropout_p0075_plateau_es_aspp_context
description: Extra-wide single-frame U-Net with Line Target auxiliary loss, p=0.075 bottleneck dropout, lightweight dilated bottleneck context, reduce-on-plateau scheduling, and early stopping with best-checkpoint restoration.
input_mode: single_frame_rgb
output_form: mask_logits
auxiliary_targets:
  - name: line
    output: line_logits
    loss: weighted_bce
    weight: 0.10
data:
  sampling_policy: deterministic_shuffle
  augmentation_policy: none
training:
  loss: bce_dice
  optimizer: adamw
  learning_rate: 0.001
  batch_size: 8
  max_epochs: 80
  scheduler:
    policy: reduce_on_plateau
    factor: 0.5
    patience: 5
    min_lr: 0.00001
  early_stopping:
    enabled: true
    patience: 12
    min_delta: 0.001
    restore_best_checkpoint: true
