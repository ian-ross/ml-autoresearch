name: single_frame_medium_unet_line_auxiliary_w005
description: Medium-capacity single-frame U-Net with Harness-derived line auxiliary target at weight 0.05 for a recall-oriented follow-up.
input_mode: single_frame_rgb
output_form: mask_logits
auxiliary_targets:
  - name: line
    output: line_logits
    loss: weighted_bce
    weight: 0.05
data:
  sampling_policy: deterministic_shuffle
  augmentation_policy: none
training:
  loss: bce_dice
  optimizer: adamw
  learning_rate: 0.001
  batch_size: 16
  max_epochs: 30
