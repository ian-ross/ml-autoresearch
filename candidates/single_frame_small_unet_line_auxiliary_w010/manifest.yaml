name: single_frame_small_unet_line_auxiliary_w010
description: Small U-Net single-frame segmentation candidate with Harness-derived line auxiliary target at weight 0.10.
input_mode: single_frame_rgb
output_form: mask_logits
auxiliary_targets:
  - name: line
    output: line_logits
    loss: weighted_bce
    weight: 0.10
data:
  sampling_policy: deterministic_shuffle
training:
  loss: bce_dice
  optimizer: adamw
  learning_rate: 0.001
  batch_size: 16
  max_epochs: 30
