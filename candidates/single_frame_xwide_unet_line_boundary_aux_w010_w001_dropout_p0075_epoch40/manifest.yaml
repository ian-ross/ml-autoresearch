name: single_frame_xwide_unet_line_boundary_aux_w010_w001_dropout_p0075_epoch40
description: Extra-wide single-frame U-Net with p=0.075 bottleneck dropout, Harness-derived line auxiliary target, very-low-weight boundary auxiliary target, and a 40-epoch training budget.
input_mode: single_frame_rgb
output_form: mask_logits
auxiliary_targets:
  - name: line
    output: line_logits
    loss: weighted_bce
    weight: 0.10
  - name: boundary
    output: boundary_logits
    loss: weighted_bce
    weight: 0.01
data:
  sampling_policy: deterministic_shuffle
  augmentation_policy: none
training:
  loss: bce_dice
  optimizer: adamw
  learning_rate: 0.001
  batch_size: 8
  max_epochs: 40
