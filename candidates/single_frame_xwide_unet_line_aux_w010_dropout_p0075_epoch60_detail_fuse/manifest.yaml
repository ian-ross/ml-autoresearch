name: single_frame_xwide_unet_line_aux_w010_dropout_p0075_epoch60_detail_fuse
description: Extra-wide single-frame U-Net with Harness-derived line auxiliary target, p=0.075 bottleneck dropout, 60 epochs, and a shallow high-resolution detail-fusion head to test whether preserving encoder detail reduces tiny-mask misses and large-mask under-segmentation.
input_mode: single_frame_rgb
output_form: mask_logits
auxiliary_targets:
  - name: line
    output: line_logits
    loss: weighted_bce
    weight: 0.10
data:
  sampling_policy: deterministic_shuffle
  augmentation_policy: none
training:
  loss: bce_dice
  optimizer: adamw
  learning_rate: 0.001
  batch_size: 8
  max_epochs: 60
