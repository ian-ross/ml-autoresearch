request_id: capability_2026_06_01_boundary_target_agent_validator_sync
capability_type: contract_surface
blocked_hypothesis: >-
  The next useful Ground-Camera Contrail Detection experiment is to add a
  conservative Harness-derived Boundary Target auxiliary head to the current best
  p=0.075 extra-wide Line Target U-Net, comparing against
  run_20260601_085755_25cd06. The hypothesis is that low-weight boundary
  supervision can reduce boundary under-segmentation and false-positive spillover
  while preserving the current model's recall gain.
current_contract_insufficiency: >-
  The read-only Candidate Experiment Contract and Harness Capabilities documents
  exposed inside the Agent Control Boundary describe Boundary Target auxiliary
  support as implemented, but the agent-safe static validator rejected a draft
  manifest with name: boundary and output: boundary_logits. The rejection was:
  "auxiliary_targets.1.name: Input should be 'line' (got 'boundary');
  auxiliary_targets.1.output: Input should be 'line_logits' (got
  'boundary_logits')". Because Candidate Submission Preparation is the required
  autonomous handoff path, the agent cannot safely submit the documented
  Boundary Target experiment and must not work around this by deriving boundary
  targets or losses in candidate code.
expected_research_value: >-
  Boundary auxiliary supervision is the clearest non-dropout next family after
  the latest notes: pure dropout tuning has reached a narrow frontier, while the
  current best failure-bucket evaluation still shows large-mask boundary
  under-segmentation, false-positive-heavy spillover, and tiny missed positives.
  Synchronizing the validator with the documented contract would unblock a small,
  auditable experiment that tests whether edge-aware auxiliary supervision adds
  value beyond the existing Line Target.
safety_reproducibility_risks: >-
  Boundary Target derivation, positive weighting, auxiliary loss computation,
  output-key validation, and resolved-manifest recording must remain
  Harness-owned and deterministic. The validator and ingestion path should reject
  unknown auxiliary outputs, preserve exact output names and shapes, and keep
  primary model comparison on Contrail Mask val/dice so the auxiliary boundary
  target does not become a separate optimization objective controlled by
  Candidate Experiment code.
minimal_harness_change: >-
  Update the agent-safe Candidate Submission Preparation/static validation path
  and any shared manifest schema used during Agent Handoff Ingestion so that it
  accepts the documented implemented Boundary Target surface: auxiliary target
  name boundary, output boundary_logits, Harness-owned weighted_bce loss, and
  bounded weight in the same range as other auxiliary targets. If Boundary Target
  execution is not actually available in the runner, update the exposed docs or
  handoff state so the agent sees it as planned rather than implemented.
candidate_authority_requested: none
example_follow_up_experiments:
  - >-
    Submit the drafted line-plus-boundary candidate
    single_frame_xwide_unet_line_boundary_aux_w010_w005_dropout_p0075 with Line
    Target weight 0.10, Boundary Target weight 0.05, and all other settings
    matched to run_20260601_085755_25cd06.
  - >-
    If the low-weight line-plus-boundary run is competitive, request a bounded
    failure-bucket Post-Run Evaluation focused on boundary-heavy false negatives,
    false-positive-heavy spillover, empty-mask false positives, and tiny missed
    positives.
  - >-
    If line-plus-boundary regresses, run a boundary-only or smaller-boundary-weight
    ablation only if the first Result indicates that the boundary target is
    promising but over-weighted.
priority: high
