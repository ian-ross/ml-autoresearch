request_id: capability_2026_06_13_completed_run_artifact_exposure
capability_type: operational_policy
blocked_hypothesis: >-
  The campaign cannot safely choose the next Ground-Camera Contrail Detection
  Candidate Experiment until the completed head-dropout Run
  run_20260603_164830_9fcbc4 is visible inside the Agent Control Boundary. That
  Run was submitted to test whether adding p=0.05 dropout in the segmentation
  head improves calibration/precision over the current best
  run_20260602_203450_c05550 without sacrificing the recall gains from p=0.075
  decoder dropout and 60-epoch training.
current_contract_insufficiency: >-
  The Research Ledger records run_20260603_164830_9fcbc4 as completed with final
  metrics at /home/iross/code/ml-autoresearch/runs/run_20260603_164830_9fcbc4/outputs/final_metrics.json,
  but the refreshed Agent Control Boundary still does not expose that Run's
  artifact tree. The agent-safe command `ml-autoresearch-agent run-summary
  --runs-root /home/iross/code/ml-autoresearch/runs --run-id
  run_20260603_164830_9fcbc4 --json` reports `run directory does not exist`.
  Without the final/best metrics and qualitative artifacts, the agent cannot
  write a provenance-grounded Research Note or make an evidence-based next
  Candidate Submission.
expected_research_value: >-
  Exposing completed Run artifacts to the Agent Control Boundary preserves the
  autonomous loop's evidence chain: observe Result, write a Research Note, then
  choose the next hypothesis. For this specific Run, the decision controls
  whether to follow head-level regularization, abandon another local dropout
  tweak after multiple regressions, or request scheduler/early-stopping support
  as the next capability direction.
safety_reproducibility_risks: >-
  The agent should receive read-only access only to Harness-produced Run summary
  artifacts and approved qualitative outputs for completed Runs. The exposure
  path must not grant candidate code filesystem access, allow mutation of Run
  artifacts, reveal locked-evaluation data, or permit direct MLflow writes. The
  run-summary view should remain deterministic and provenance-preserving.
minimal_harness_change: >-
  Refresh or mount the read-only Research History `runs/` artifact tree for
  completed Runs into each Agent Control Boundary, and ensure
  `ml-autoresearch-agent run-summary` can inspect completed Runs referenced by
  the latest Research Ledger. At minimum, expose final_metrics.json,
  best_metrics.json, run_metadata.json, resolved_manifest.yaml, and approved
  prediction/evaluation artifact paths for run_20260603_164830_9fcbc4.
candidate_authority_requested: none
example_follow_up_experiments:
  - >-
    If run_20260603_164830_9fcbc4 improves or nearly matches the current best
    with a better precision/recall tradeoff, submit a bounded follow-up varying
    head-dropout placement or magnitude while keeping the 60-epoch p=0.075
    xwide Line Target backbone fixed.
  - >-
    If run_20260603_164830_9fcbc4 regresses, stop local head-dropout tuning and
    prefer a Harness-owned scheduler/early-stopping Capability Request or a
    qualitatively different in-contract architecture hypothesis.
priority: high
