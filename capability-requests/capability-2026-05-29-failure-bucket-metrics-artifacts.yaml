request_id: capability_2026_05_29_failure_bucket_metrics_artifacts
capability_type: operational_policy
blocked_hypothesis: >-
  The current-best medium-capacity U-Net may have improved best-validation Dice by
  becoming too conservative; deciding whether to tune for recall, continue scaling,
  or accept the precision-heavy tradeoff requires whole-validation failure-bucket
  metrics and representative artifacts for missed positive masks and false-positive
  masks.
current_contract_insufficiency: >-
  The explicit Post-Run Evaluation request for run_20260529_155844_d8ebec completed,
  but the produced artifact set only contains evaluation_metadata.json and summary.json.
  The summary states that mode-specific metric computation can deepen behind the
  request gate, so the current Harness-owned failure_bucket_review surface does not
  yet provide per-bucket sample metrics, threshold-sensitive aggregate metrics, or
  diagnostic visual artifacts needed for the next research decision.
expected_research_value: >-
  A real failure-bucket review would show whether the medium model's lower recall is
  concentrated in missed positive masks, thin/faint contrails, threshold choice, or
  acceptable edge cases. This directly determines whether the next Candidate Experiment
  should tune an in-contract recall lever, scale the architecture further, revisit
  augmentation, or promote the model without more architecture changes.
safety_reproducibility_risks: >-
  Selection of diagnostic examples can bias interpretation if it is agent-chosen or
  ad hoc. The Harness should own deterministic bucket definitions, thresholds,
  artifact count limits, validation-split access, and provenance metadata so diagnostics
  remain reproducible and do not expose new Candidate Experiment authority.
minimal_harness_change: >-
  Extend the request-gated failure_bucket_review Post-Run Evaluation mode to compute
  bounded Harness-owned diagnostics over the Working Validation Split: aggregate and
  per-sample metrics at the requested primary threshold, optional threshold-sweep
  summaries, deterministic selection of worst_by_dice, false_positive_heavy,
  false_negative_heavy, empty_mask_false_positives, and missed_positive_masks buckets,
  and saved overlays/probability heatmaps with evaluation provenance under the parent
  Run's outputs/evaluations/<evaluation_id>/ directory.
candidate_authority_requested: none
example_follow_up_experiments:
  - >-
    If missed-positive buckets show recall failures for run_20260529_155844_d8ebec,
    submit a medium U-Net follow-up using existing in-contract training knobs or loss
    choices to recover recall while comparing against the same current-best Run.
  - >-
    If failure buckets show few harmful misses and mostly reduced false positives,
    continue capacity-scaling experiments from the medium U-Net family without adding
    new candidate authority.
  - >-
    If threshold sweep indicates a lower operating threshold recovers Dice/recall,
    prioritize Harness-owned threshold/reporting policy or evaluation follow-up before
    changing architecture.
priority: high
