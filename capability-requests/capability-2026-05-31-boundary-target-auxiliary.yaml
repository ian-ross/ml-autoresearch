request_id: capability_2026_05_31_boundary_target_auxiliary
capability_type: contract_surface
blocked_hypothesis: >-
  The current best in-contract Ground-Camera Contrail Detection model,
  run_20260530_180658_0af8a8 / single_frame_xwide_unet_line_aux_w010_dropout,
  still misses very small positive masks and has false-negative-heavy cases on
  larger masks. A Harness-derived Boundary Target auxiliary head, combined with
  the existing Line Target, may improve edge localization and recover thin or
  low-contrast contrail regions without relying on more width or decoder-gating
  complexity.
current_contract_insufficiency: >-
  The current Candidate Experiment Contract exposes only the Harness-derived
  Line Target auxiliary output. Candidate Experiments cannot request a boundary
  auxiliary target, boundary_logits output validation, a Harness-owned boundary
  target derivation, or a bounded auxiliary boundary loss weight. Implementing
  boundary masks or losses inside candidate code would violate the contract by
  smuggling target derivation and loss policy into Model Architecture code.
expected_research_value: >-
  Recent architecture-only experiments appear near a precision/recall plateau:
  xwide bottleneck dropout is the current best by best-validation Dice, while
  attention gating increased recall but reduced precision enough to regress.
  Boundary supervision would test a distinct, Harness-owned geometric signal for
  the remaining false-negative and mask-shape errors. It could determine whether
  edge-aware auxiliary supervision is a better next family than further capacity
  scaling, ad hoc attention gates, or pure threshold tuning.
safety_reproducibility_risks: >-
  Boundary derivation from Contrail Masks must be deterministic and
  Research-Problem-owned so that candidate code cannot choose morphology,
  distance-transform thresholds, target dilation, or sample-dependent behavior.
  The Harness should validate output keys and shapes, own the auxiliary loss and
  allowed weight range, record all resolved target/loss settings, and keep
  primary comparison on Contrail Mask val/dice to avoid optimizing an auxiliary
  target as an end in itself.
minimal_harness_change: >-
  Add an allowlisted Boundary Target auxiliary surface to the Candidate
  Experiment Contract: a Harness-derived per-pixel boundary target for GVCCS
  masks, allowed manifest entries for name: boundary, output: boundary_logits,
  loss: weighted_bce or another already approved Harness-owned auxiliary loss,
  a bounded weight range such as 0.0 to 1.0, output validation for boundary_logits,
  resolved-manifest recording, and optional diagnostic val/boundary_f1 metrics.
  Candidate authority should remain limited to declaring the output head and
  bounded loss weight in the manifest.
candidate_authority_requested: none
example_follow_up_experiments:
  - >-
    Add a low-weight Boundary Target auxiliary head to the current best
    xwide-dropout base while preserving the existing Line Target weight 0.10;
    compare against run_20260530_180658_0af8a8 for best-validation Dice,
    precision/recall balance, and missed-positive failure buckets.
  - >-
    Compare boundary-only auxiliary supervision against the existing line-only
    auxiliary xwide-dropout base to separate edge-localization value from
    centerline-supervision value.
  - >-
    Run a bounded line-plus-boundary weight comparison, for example boundary
    weights 0.05 and 0.10 with fixed Line Target weight 0.10, if Harness batch
    policy permits an Experiment Batch.
priority: high
